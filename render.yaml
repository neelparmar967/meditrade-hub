services:
  - type: web
    name: meditrade-hub-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        value: https://meditrade-hub-web.onrender.com

  - type: web
    name: meditrade-hub-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://meditrade-hub-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
